<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>明日方舟插画集</title>
<style>
  /* ===== 全局重置与暗色基调 ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html{scroll-behavior: smooth;}
  body {
    background-color: #121212;
    color: #d0d0d0;
    font-family: 'Inter', 'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
  img{max-width:100%;display:block;object-fit:cover;}
  /* ===== 通用线条 ===== */
  .line-h {
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
    margin: 0;
  }
  .line-v {
    width: 1px;
    height: 100%;
    background: rgba(255, 255, 255, 0.12);
  }
  /* ===== 导航栏 ===== */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 1.5rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(18, 18, 18, 0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    transition: transform 0.3s ease;
  }
  .logo {
    font-weight: 300;
    letter-spacing: 2px;
    font-size: 1.2rem;
    color: #f0f0f0;
    transition: opacity 0.3s ease;
  }
  .logo:hover {
    opacity: 0.8;
  }
  .nav-links {
    display: flex;
    gap: 2.5rem;
  }
  .nav-links a {
    font-size: 0.9rem;
    font-weight: 300;
    position: relative;
    padding: 0.2rem 0;
    transition: color 0.3s;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.8);
    transition: width 0.3s ease;
  }
  .nav-links a:hover {
    color: #ffffff;
  }
  .nav-links a:hover::after {
    width: 100%;
  }
  .nav-links a.active {
    color: #ffffff;
  }
  .nav-links a.active::after {
    width: 100%;
  }
  /* 移动端导航 */
  @media (max-width: 640px) {
    .nav-links {
      gap: 1.5rem;
    }
  }
  /* ===== 通用区块间距 ===== */
  section {
    padding: 5rem 5% 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  /* ===== 首页首屏 ===== */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    padding-top: 80px;
  }
  .hero-img-placeholder {
    width: 80%;
    max-width: 1000px;
    height: 50vh;
    min-height: 300px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.2);
    font-weight: 300;
    margin-bottom: 2rem;
    position: relative;
    overflow:hidden;
    border-radius: 4px;
  }
  .hero-img-placeholder img{
    width:100%;
    height:100%;
    transition: transform 0.5s ease;
  }
  .hero-img-placeholder:hover img{
    transform: scale(1.02);
  }
  .hero-img-placeholder::before,
  .hero-img-placeholder::after {
    content: '';
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: rgba(255, 255, 255, 0.25);
    transform: scaleY(0);
    transform-origin: top;
    animation: drawLine 1.2s ease-out forwards;
    z-index:2;
  }
  .hero-img-placeholder::before {
    left: 20px;
    animation-delay: 0.3s;
  }
  .hero-img-placeholder::after {
    right: 20px;
    animation-delay: 0.5s;
  }
  @keyframes drawLine {
    to {
      transform: scaleY(1);
    }
  }
  .hero-tagline {
    font-size: 1.2rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: rgba(255, 255, 255, 0.75);
    margin-bottom: 2.5rem;
  }
  .btn-line {
    display: inline-block;
    padding: 0.7rem 2.2rem;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: transparent;
    color: #ffffff;
    font-weight: 300;
    letter-spacing: 1px;
    font-size: 0.9rem;
    transition: all 0.4s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }
  .btn-line::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.5s ease;
  }
  .btn-line:hover {
    border-color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.05);
    transform: translateY(-2px);
  }
  .btn-line:hover::before {
    left: 100%;
  }
  /* ===== 页脚 ===== */
  footer {
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 2rem 5%;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.3);
    background: #121212;
  }
  /* ===== 滚动淡入通用 ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .fade-up.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .hidden {
    display: none;
  }
</style>
</head>
<body>

  <!-- 导航栏（全局统一） -->
  <nav>
    <a href=" " class="logo">明日方舟 · 插画集</a >
    <div class="nav-links">
      <a href="aa1.html" class="active">首页</a >
      <a href="aa2.html">作品</a >
      <a href="aa3.html">关于</a >
      <a href="aa4.html">联系</a >
    </div>
  </nav>

  <!-- 首页内容 -->
  <section id="home" class="hero">
    <div class="hero-img-placeholder fade-up">
    <img src="1.jpg" alt=""/> </div>
    <div class="hero-tagline fade-up">用原画与色调构建泰拉叙事</div>
    <a href="portfolio.html" class="btn-line fade-up">查看作品集 ↓</a >
  </section>

  <!-- 页脚（全局统一） -->
  <footer>
    <div class="line-h" style="margin-bottom:1.5rem;"></div>
    © 2025 明日方舟原画作品集. 保留所有权利。
  </footer>

  <!-- JavaScript（全局统一） -->
  <script>
    (function() {
      // 滚动淡入观察器
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, { threshold: 0.15 });

      // 观察所有需要淡入的元素
      document.querySelectorAll('.fade-up').forEach(el => {
        observer.observe(el);
      });

      // 导航栏滚动隐藏/显示
      let lastScrollTop = 0;
      const nav = document.querySelector('nav');
      
      window.addEventListener('scroll', () => {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        if (scrollTop > lastScrollTop && scrollTop > 100) {
          nav.style.transform = 'translateY(-100%)';
        } else {
          nav.style.transform = 'translateY(0)';
        }
        
        lastScrollTop = scrollTop;
      });
    })();
  </script>

</body>
</html>
