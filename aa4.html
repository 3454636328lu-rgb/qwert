<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>明日方舟 · 插画集</title>
<style>
  /* ===== 全局重置与暗色基调 ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html{scroll-behavior: smooth;}
  body {
    background-color: #121212;
    color: #d0d0d0;
    font-family: 'Inter', 'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
  img{max-width:100%;display:block;object-fit:cover;}
  /* ===== 通用线条 ===== */
  .line-h {
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
    margin: 0;
  }
  .line-v {
    width: 1px;
    height: 100%;
    background: rgba(255, 255, 255, 0.12);
  }
  /* ===== 导航栏 ===== */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 1.5rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(18, 18, 18, 0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    transition: transform 0.3s ease;
  }
  .logo {
    font-weight: 300;
    letter-spacing: 2px;
    font-size: 1.2rem;
    color: #f0f0f0;
    transition: opacity 0.3s ease;
  }
  .logo:hover {
    opacity: 0.8;
  }
  .nav-links {
    display: flex;
    gap: 2.5rem;
  }
  .nav-links a {
    font-size: 0.9rem;
    font-weight: 300;
    position: relative;
    padding: 0.2rem 0;
    transition: color 0.3s;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.8);
    transition: width 0.3s ease;
  }
  .nav-links a:hover {
    color: #ffffff;
  }
  .nav-links a:hover::after {
    width: 100%;
  }
  .nav-links a.active {
    color: #ffffff;
  }
  .nav-links a.active::after {
    width: 100%;
  }
  /* 移动端导航 */
  @media (max-width: 640px) {
    .nav-links {
      gap: 1.5rem;
    }
  }
  /* ===== 通用区块间距 ===== */
  section {
    padding: 8rem 5% 6rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  /* ===== 联系页 ===== */
  .section-title {
    font-weight: 300;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    color: #e0e0e0;
  }
  .contact-flex {
    display: flex;
    flex-wrap: wrap;
    gap: 3rem;
  }
  .form-group {
    margin-bottom: 1.5rem;
    flex: 1;
    min-width: 280px;
  }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 0.4rem;
  }
  .form-line {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    padding: 0.7rem 0;
    color: #fff;
    font-family: inherit;
    font-weight: 300;
    transition: border-color 0.3s;
    outline: none;
  }
  .form-line:focus {
    border-bottom-color: rgba(255, 255, 255, 0.6);
  }
  .btn-line {
    display: inline-block;
    padding: 0.7rem 2.2rem;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: transparent;
    color: #ffffff;
    font-weight: 300;
    letter-spacing: 1px;
    font-size: 0.9rem;
    transition: all 0.4s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }
  .btn-line::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.5s ease;
  }
  .btn-line:hover {
    border-color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.05);
    transform: translateY(-2px);
  }
  .btn-line:hover::before {
    left: 100%;

  }
  .contact-info {
    flex: 0 0 250px;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    padding-left: 2rem;
  }
  .contact-info p {
    margin-bottom: 1rem;
    font-weight: 300;
    color: #b0b0b0;
  }
  /* ===== 页脚 ===== */
  footer {
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 2rem 5%;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.3);
    background: #121212;
  }
  /* ===== 滚动淡入通用 ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .fade-up.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .hidden {
    display: none;
  }
</style>
</head>
<body>

  <!-- 导航栏（全局统一） -->
  <nav>
    <a href=" " class="logo">明日方舟 · 作品集</a >
    <div class="nav-links">
      <a href="aa1.html">首页</a >
      <a href="aa2.html">作品</a >
      <a href="aa3.html">关于</a >
      <a href="aa4.html" class="active">联系</a >
    </div>
  </nav>

  <!-- 联系方式内容 -->
  <section id="contact">
    <div class="section-title fade-up">● 联系</div>
    <div class="line-h" style="margin-bottom:2rem;"></div>
    <div class="contact-flex">
      <div class="form-group fade-up">
        <form id="contactForm" action="#" method="post">
          <div class="form-group">
            <label>姓名</label>
            <input type="text" class="form-line" placeholder="你的名字" required>
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" class="form-line" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label>合作意向</label>
            <textarea class="form-line" rows="3" placeholder="简述项目或想法" required></textarea>
          </div>
          <button type="submit" class="btn-line" style="margin-top:1rem;">发送消息</button>
        </form>
      </div>
      <div class="contact-info fade-up">
        <p>📧 art@arknights-art.com</p >
        <p>📷 Instagram: @ark_illust</p >
        <p style="margin-top:1.5rem; font-size:0.8rem; color: rgba(255,255,255,0.4);">
          委托合作须知：<br>请简要说明项目需求与时间，我会在48小时内回复。
        </p >
      </div>
    </div>
  </section>

  <!-- 页脚（全局统一） -->
  <footer>
    <div class="line-h" style="margin-bottom:1.5rem;"></div>
    © 2025 明日方舟原画作品集. 保留所有权利。
  </footer>

  <!-- JavaScript（全局统一 + 表单验证） -->
  <script>
    (function() {
      // 滚动淡入观察器
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, { threshold: 0.15 });

      // 观察所有需要淡入的元素
      document.querySelectorAll('.fade-up').forEach(el => {
        observer.observe(el);
      });

      // 导航栏滚动隐藏/显示
      let lastScrollTop = 0;
      const nav = document.querySelector('nav');
      
      window.addEventListener('scroll', () => {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        if (scrollTop > lastScrollTop && scrollTop > 100) {
          nav.style.transform = 'translateY(-100%)';
        } else {
          nav.style.transform = 'translateY(0)';
        }
        
        lastScrollTop = scrollTop;
      });

      // 简单表单验证
      const form = document.getElementById('contactForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alert('消息已发送！我会尽快回复您。');
        form.reset();
      });
    })();
  </script>

</body>
</html>
