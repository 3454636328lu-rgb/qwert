<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>明日方舟 · 插画集</title>
<style>
  /* ===== 全局重置与暗色基调 ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html{scroll-behavior: smooth;}
  body {
    background-color: #121212;
    color: #d0d0d0;
    font-family: 'Inter', 'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
  img{max-width:100%;display:block;object-fit:cover;}
  /* ===== 通用线条 ===== */
  .line-h {
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
    margin: 0;
  }
  .line-v {
    width: 1px;
    height: 100%;
    background: rgba(255, 255, 255, 0.12);
  }
  /* ===== 导航栏 ===== */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 1.5rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(18, 18, 18, 0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    transition: transform 0.3s ease;
  }
  .logo {
    font-weight: 300;
    letter-spacing: 2px;
    font-size: 1.2rem;
    color: #f0f0f0;
    transition: opacity 0.3s ease;
  }
  .logo:hover {
    opacity: 0.8;
  }
  .nav-links {
    display: flex;
    gap: 2.5rem;
  }
  .nav-links a {
    font-size: 0.9rem;
    font-weight: 300;
    position: relative;
    padding: 0.2rem 0;
    transition: color 0.3s;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.8);
    transition: width 0.3s ease;
  }
  .nav-links a:hover {
    color: #ffffff;
  }
  .nav-links a:hover::after {
    width: 100%;
  }
  .nav-links a.active {
    color: #ffffff;
  }
  .nav-links a.active::after {
    width: 100%;
  }
  /* 移动端导航 */
  @media (max-width: 640px) {
    .nav-links {
      gap: 1.5rem;
    }
  }
  /* ===== 通用区块间距 ===== */
  section {
    padding: 8rem 5% 6rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  /* ===== 作品集网格 ===== */
  .section-title {
    font-weight: 300;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    color: #e0e0e0;
  }
  .filter-bar {
    display: flex;
    gap: 2rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    padding-bottom: 0.8rem;
  }
  .filter-btn {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 300;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid transparent;
    transition: color 0.3s, border-color 0.3s;
  }
  .filter-btn.active,
  .filter-btn:hover {
    color: #ffffff;
    border-bottom-color: rgba(255, 255, 255, 0.6);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
  }
  .grid-item {
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.02);
    transition: border-color 0.35s ease, background 0.35s ease, transform 0.25s ease;
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.35s ease, background 0.35s ease;
    border-radius: 4px;
    overflow: hidden;
  }
  .grid-item.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .grid-item:hover {
    border-color: rgba(255, 255, 255, 0.45);
    background: rgba(255, 255, 255, 0.04);
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }
  .img-placeholder {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: rgba(255, 255, 255, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.15);
    font-weight: 300;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    overflow:hidden;
  }
  .img-placeholder img{
    transition: transform 0.5s ease;
    width: 100%;
    height: 100%;
  }
  .grid-item:hover .img-placeholder img{
    transform: scale(1.05);
  }
  .item-info {
    padding: 1rem;
  }
  .item-title {
    font-weight: 400;
    font-size: 1rem;
    color: #eaeaea;
  }
  .item-category {
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  /* ===== 页脚 ===== */
  footer {
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding: 2rem 5%;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.3);
    background: #121212;
  }
  /* ===== 滚动淡入通用 ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .fade-up.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .hidden {
    display: none;
  }

  /* ===== 图片放大模态框样式 ===== */
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    padding: 2rem;
  }
  .modal.active {
    opacity: 1;
    visibility: visible;
  }
  .modal-content {
    max-width: 90%;
    max-height: 90vh;
    position: relative;
    transform: scale(0.9);
    transition: transform 0.3s ease;
  }
  .modal.active .modal-content {
    transform: scale(1);
  }
  .modal-img {
    width: 100%;
    height: auto;
    max-height: 90vh;
    border-radius: 4px;
  }
  .close-btn {
    position: absolute;
    top: -40px;
    right: 0;
    color: #ffffff;
    font-size: 1.8rem;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.8;
    transition: opacity 0.3s ease;
  }
  .close-btn:hover {
    opacity: 1;
  }

  /* ===== 新增：模态框切换按钮样式 ===== */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.5);
    border: none;
    color: white;
    font-size: 2rem;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.3s ease, background 0.3s ease;
    border-radius: 50%;
    z-index: 10;
    padding: 0;
  }
  .nav-btn:hover {
    opacity: 1;
    background: rgba(0, 0, 0, 0.7);
  }
  .prev-btn {
    left: -60px;
  }
  .next-btn {
    right: -60px;
  }

  /* 移动端模态框适配 */
  @media (max-width: 640px) {
    .modal {
      padding: 1rem;
    }
    .close-btn {
      top: -35px;
      font-size: 1.5rem;
    }
    /* 移动端切换按钮适配 */
    .nav-btn {
      width: 40px;
      height: 40px;
      font-size: 1.5rem;
    }
    .prev-btn {
      left: -45px;
    }
    .next-btn {
      right: -45px;
    }
  }
</style>
</head>
<body>

  <!-- 导航栏（全局统一） -->
  <nav>
    <a href=" " class="logo">明日方舟 · 作品集</a >
    <div class="nav-links">
      <a href="aa1.html">首页</a >
      <a href="aa2.html" class="active">作品</a >
      <a href="aa3.html">关于</a >
      <a href="aa4.html">联系</a >
    </div>
  </nav>

  <!-- 作品集内容 -->
  <section id="portfolio">
    <div class="section-title fade-up">● 作品集</div>
    <div class="line-h" style="margin-bottom:2rem;"></div>

    <!-- 分类筛选按钮 -->
    <div class="filter-bar fade-up">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="illustration">插画</button>
      <button class="filter-btn" data-filter="concept">概念设计</button>
      <button class="filter-btn" data-filter="branding">场景原画</button>
    </div>

    <!-- 作品网格 -->
    <div class="grid" id="portfolioGrid">
      <!-- 作品1 插画 -->
      <div class="grid-item fade-up" data-category="illustration">
        <div class="img-placeholder">
        <img src="2.jpg" alt="壁炉闲谈" class="portfolio-img"/> </div>

      </div>

          <div class="item-title">命途迭代</div>

        </div>
      </div>
      <!-- 作品4 插画 -->
      <div class="grid-item fade-up" data-category="illustration">
        <div class="img-placeholder">
        <img src="8.jpg" alt="春日野餐" class="portfolio-img"/> </div>
        <div class="item-info">
          <div class="item-title">春日野餐</div>
          <div class="item-category">插画</div>
        </div>
      </div>
      <!-- 作品5 插画 -->
      <div class="grid-item fade-up" data-category="illustration">
        <div class="img-placeholder">
        <img src="6.jpg" alt="泡泡戏法" class="portfolio-img"/> </div>
        <div class="item-info">
          <div class="item-title">泡泡戏法</div>
          <div class="item-category">插画</div>
        </div>
      </div>
		<!-- 作品6 插画 -->
      <div class="grid-item fade-up" data-category="illustration">
        <div class="img-placeholder">
        <img src="7.jpg" alt="游园惊梦" class="portfolio-img"/> </div>
        <div class="item-info">
          <div class="item-title">游园惊梦</div>
          <div class="item-category">插画</div>
        </div>
      </div>		
		<!-- 作品7 插画 -->
      <div class="grid-item fade-up" data-category="illustration">
        <div class="img-placeholder">
        <img src="9.jpg" alt="挽歌以火" class="portfolio-img"/> </div>

          <div class="item-title">挽歌以火</div>

        </div>
      </div>
    </div>
  </section>

  <!-- 图片放大模态框（新增左右切换按钮） -->
  <div class="modal" id="imageModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModal">&times;</span>
      <!-- 新增：上一张按钮 -->
      <button class="nav-btn prev-btn">&lsaquo;</button>
      <!-- 新增：下一张按钮 -->
      <button class="nav-btn next-btn">&rsaquo;</button>
      <img src="" alt="放大查看" class="modal-img" id="modalImg">
    </div>
  </div>

  <!-- 页脚（全局统一） -->
  <footer>
    <div class="line-h" style="margin-bottom:1.5rem;"></div>
    © 2025 明日方舟原画作品集. 保留所有权利。
  </footer>

  <!-- JavaScript（全局统一 + 作品筛选 + 图片放大 + 左右切换） -->
  <script>
    (function() {
      // 滚动淡入观察器
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
          }
        });
      }, { threshold: 0.15 });

      // 观察所有需要淡入的元素
      document.querySelectorAll('.fade-up, .grid-item').forEach(el => {
        observer.observe(el);
      });

      // 导航栏滚动隐藏/显示
      let lastScrollTop = 0;
      const nav = document.querySelector('nav');
      
      window.addEventListener('scroll', () => {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        if (scrollTop > lastScrollTop && scrollTop > 100) {
          nav.style.transform = 'translateY(-100%)';
        } else {
          nav.style.transform = 'translateY(0)';
        }
        
        lastScrollTop = scrollTop;
      });

      // 分类筛选功能
      const filterBtns = document.querySelectorAll('.filter-btn');
      const gridItems = document.querySelectorAll('.grid-item');

      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const filterValue = btn.getAttribute('data-filter');
          
          gridItems.forEach(item => {
            if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
              item.style.display = '';
              item.classList.remove('revealed');
              void item.offsetWidth;
              item.classList.add('revealed');
            } else {
              item.style.display = 'none';
            }
          });
        });
      });

      // 初始加载时，视口内的网格项立即显示
      window.addEventListener('load', () => {
        document.querySelectorAll('.grid-item').forEach(item => {
          const rect = item.getBoundingClientRect();
          if (rect.top < window.innerHeight && rect.bottom > 0) {
            item.classList.add('revealed');
          }
        });
      });

      // ===== 图片放大查看 + 左右切换功能 =====
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImg');
      const closeModal = document.getElementById('closeModal');
      const portfolioImgs = document.querySelectorAll('.portfolio-img');
      // 新增：获取左右切换按钮
      const prevBtn = document.querySelector('.prev-btn');
      const nextBtn = document.querySelector('.next-btn');

      // 新增：收集所有图片的src和alt，用于切换
      const imageList = Array.from(portfolioImgs).map(img => ({
        src: img.src,
        alt: img.alt
      }));
      // 新增：记录当前显示的图片索引
      let currentIndex = 0;

      // 点击图片打开模态框
      portfolioImgs.forEach((img, index) => {
        img.addEventListener('click', (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          currentIndex = index; // 记录当前点击的图片索引
          modal.classList.add('active');
          modalImg.src = img.src;
          modalImg.alt = img.alt;
          // 禁止页面滚动
          document.body.style.overflow = 'hidden';
        });
      });

      // 新增：切换图片核心函数
      function switchImage(direction) {
        // direction: -1 = 上一张, 1 = 下一张
        currentIndex += direction;
        
        // 循环切换：超出边界则回到另一端
        if (currentIndex < 0) {
          currentIndex = imageList.length - 1;
        }
        if (currentIndex >= imageList.length) {
          currentIndex = 0;
        }
        
        // 更新模态框图片
        modalImg.src = imageList[currentIndex].src;
        modalImg.alt = imageList[currentIndex].alt;
      }

      // 新增：绑定上一张按钮点击事件
      prevBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止冒泡到模态框关闭
        switchImage(-1);
      });

      // 新增：绑定下一张按钮点击事件
      nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        switchImage(1);
      });

      // 点击关闭按钮关闭模态框
      closeModal.addEventListener('click', () => {
        modal.classList.remove('active');
        document.body.style.overflow = ''; // 恢复页面滚动
      });

      // 点击模态框遮罩层关闭
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      // 新增：键盘操作增强（ESC关闭，左右箭头切换）
      document.addEventListener('keydown', (e) => {
        if (modal.classList.contains('active')) {
          if (e.key === 'Escape') {
            // ESC键关闭
            modal.classList.remove('active');
            document.body.style.overflow = '';
          } else if (e.key === 'ArrowLeft') {
            // 左箭头 = 上一张
            e.preventDefault(); // 阻止页面滚动
            switchImage(-1);
          } else if (e.key === 'ArrowRight') {
            // 右箭头 = 下一张
            e.preventDefault();
            switchImage(1);
          }
        }
      });

    })();
  </script>

</body>
</html>
